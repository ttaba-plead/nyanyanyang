];
const TYPES=[
  {sym:"cat-hogu",subType:"귀가 얇은",name:"팔랑귀 집사",eng:"남의 말을 잘 믿는 순수한 유형",diag:"우리 집사는 마음이 너무 여려... 남의 말을 너무 잘 믿는다냥 😿\n친구 돕는 것도 좋고 투자도 좋지만, 그러다 내 츄르값까지 다 퍼줄까 봐 걱정돼.\n가끔은 '싫어!'라고 거절하는 연습도 좀 해라냥!",prophecy:"보증 잘못 서서 남의 빚 갚고 있거나, '대박 정보' 믿고 산 주식이 상폐 됐을 확률이 높다냥!! 통장 잔고가 마이너스만 아니면 다행이다냥.",tips:["사람을 너무 믿어서 곤란해질 때가 있지?","거절 못 해서 돈 빌려줬다가 떼이거나, 좋다는 말만 믿고 투자했다가 후회한 적 있지 않냥?","혹시 사기를 당하거나 투자가 잘못돼도 너무 자책하지 마.","'다시 일어설 기회'는 누구에게나 열려 있어. 실수해도 괜찮아!"],partnerSym:"cat-safe",partnerName:"철벽 방어 쫄보 집사",partnerDesc:"네 돈을 지켜줄게!"},
  {sym:"cat-yolo",subType:"오늘만 사는",name:"욜로 집사",eng:"소비 요정 유형",diag:"인생 뭐 있어? 즐거우면 그만이지! 😼\n근데 집사야, 카드값 고지서 볼 때마다 심장이 쫄깃하지 않냥?\n'어떻게든 되겠지' 하고 넘기면 난 나중에 굶으라는 거냥...",prophecy:"빚 독촉 전화 받느라 핸드폰 꺼두고 도망 다닐까 무섭다냥!!! 그럼 그때 나는 어떡하냥? 😿",tips:["지금 행복한 건 좋은데, 감당 못 할 짐은 지지 않도록 조심해!","월급 들어오자마자 카드값으로 '퍼가요~♡' 당해서 또 빈털터리 된 거 아니냥?","혹시라도 빚 때문에 숨이 턱 막힐 땐 도망가지 말고 도움을 청해.","빚을 멈춰주는 '리셋 버튼'이 있다는 거, 너만 알고 있어라냥!"],partnerSym:"cat-rich",partnerName:"척척박사 솔로몬 집사",partnerDesc:"널 말려줄 친구가 필요해!"},
  {sym:"cat-safe",subType:"철벽 방어",name:"쫄보 집사",eng:"안전 제일주의 유형",diag:"안전한 게 최고지... 근데 너무 쫄지는 마라냥 🐹\n성실한 건 아주 칭찬해! 하지만 금융이나 제도를 활용할 줄 모르면 기회를 놓친다냥!\n구더기 무서워서 장 못 담그면 맛있는 걸 못 먹는다구.",prophecy:"굶어 죽진 않겠지만, 벼락부자도 아닌 것 같다냥... 물가는 오르는데 월급은 비슷하면, 통장 보면서 한숨 쉬고 있을지도 몰라.",tips:["살다 보면 어쩔 수 없이 빚을 질 수도 있어.","대출 문자만 봐도 기겁하고, 10원이라도 손해 볼까 봐 벌벌 떨며 살진 않았냥?","실패해도 '나라에서 받쳐주는 안전망'이 있다는 걸 기억해.","안전벨트가 튼튼하다는 걸 알면, 운전할 때 덜 무섭지 않겠어?"],partnerSym:"cat-hogu",partnerName:"귀가 얇은 팔랑귀 집사",partnerDesc:"네 신중함을 나눠줘!"},
  {sym:"cat-rich",subType:"척척박사",name:"솔로몬 집사",eng:"금융 지식 만렙 유형",diag:"오... 제법인데? 넌 내가 잔소리할 게 없다냥 😎\n돈 관리도 철저하고 위기 대처도 빨라. 넌 나중에 츄르 공장 사장이 될 관상이야.\n하지만 너무 자만하면 원숭이도 나무에서 떨어지니 조심!",prophecy:"큰 이변이 없는 한 건물주가 되어 나에게 최고급 캣타워를 선물할 관상이다냥. 통장에 '0'이 너무 많아서 세기도 힘들겠는데?",tips:["똑똑한 집사는 이미 알고 있겠지?","너는 빚도 전략적으로 잘 쓰잖아? 그치만 가끔은 그 자신감이 독이 될 때가 있다는 것도 명심해야 한다냥.","법은 사람을 벌주려고 있는 게 아니라, 구해주려고(개인회생 등) 있는 거야.","주변에 힘들어하는 친구가 있다면 네가 이 '법적 비상구'를 꼭 알려줘라냥."],partnerSym:"cat-yolo",partnerName:"오늘만 사는 욜로 집사",partnerDesc:"너의 계획성이 필요해!"}
];
let scores={C:0,S:0,K:0,A:0,F:0,T:0},qIdx=0;
function catSVGsmall(){return `<svg width="30" height="30" viewBox="0 0 60 60"><use href="#cat-cool"/></svg>`;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function scrollToBottom(){
  const ca=document.getElementById('chat-area');
  ca.scrollTop=ca.scrollHeight;
  setTimeout(()=>{ca.scrollTop=ca.scrollHeight;},80);
}
function addCatMsg(text){
  const ca=document.getElementById('chat-area'),t=getTime();
  const row=document.createElement('div');row.className='msg-row-cat';
  row.innerHTML=`<div class="cat-profile">${catSVGsmall()}</div><div class="cat-msg-col"><div class="cat-name">예언냥</div><div class="cat-bubble-row"><div class="bubble-cat">${text.split('\n').join('<br>')}</div><div class="msg-time">${t}</div></div></div>`;
  ca.appendChild(row);
  scrollToBottom();
}
function addUserMsg(text){
  const ca=document.getElementById('chat-area'),t=getTime();
  const row=document.createElement('div');row.className='msg-row-user';
  row.innerHTML=`<div class="msg-time">${t}</div><div class="bubble-user">${text}</div>`;
  ca.appendChild(row);
  scrollToBottom();
}
function showTyping(){
  const ca=document.getElementById('chat-area');
  const row=document.createElement('div');row.className='typing-row-cat';row.id='typing-r';
  row.innerHTML=`<div class="cat-profile">${catSVGsmall()}</div><div class="typing-bubble"><div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div></div>`;
  ca.appendChild(row);
  scrollToBottom();
}
function removeTyping(){const t=document.getElementById('typing-r');if(t)t.remove();}
async function runQ(idx){
  const ic=document.getElementById('inline-choices');if(ic)ic.remove();
  document.getElementById('prog').style.width=((idx/QS.length)*100)+'%';
  const q=QS[idx];
  for(let i=0;i<q.cat.length;i++){
    showTyping();await sleep(i===0?600:400);removeTyping();addCatMsg(q.cat[i]);
    if(i<q.cat.length-1)await sleep(300);
  }
  if(q.isNyang){await sleep(800);document.getElementById('nyang-overlay').style.display='flex';return;}
  await sleep(300);showChoices(idx,q);
}
function showChoices(idx,q){
  const ca=document.getElementById('chat-area');
  // 기존 선택지 제거
  const old=document.getElementById('inline-choices');
  if(old)old.remove();
  // 채팅창 안에 선택지 삽입
  const wrap=document.createElement('div');
  wrap.className='choice-inline';wrap.id='inline-choices';
  q.choices.forEach((c,i)=>{
    const b=document.createElement('button');b.className='choice-btn';b.textContent=c;
    b.onclick=()=>pick(idx,i,c,b);wrap.appendChild(b);
  });
  ca.appendChild(wrap);
  setTimeout(()=>scrollToBottom(),60);
}
async function pick(idx,i,text,btn){
  document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=true;b.style.opacity='.5'});
  btn.style.opacity='1';btn.classList.add('picked');
  const ic=document.getElementById('inline-choices');if(ic)ic.remove();
  const s=QS[idx].scores[i];Object.keys(s).forEach(k=>scores[k]=(scores[k]||0)+s[k]);
  addUserMsg(text);qIdx=idx+1;
  if(qIdx<QS.length)await sleep(500),runQ(qIdx);
}
function checkNyang(){
  const v=document.getElementById('nyang-input').value;
  const clean=v.replace(/\s/g,'').replace(/!/g,'');
  if(clean==='냐냐냥'||v.replace(/\s/g,'')===('냐냐냥!!!!')){doNyang();}
  else{
    const box=document.getElementById('nyang-box');
    box.classList.remove('shake');void box.offsetWidth;box.classList.add('shake');
    document.getElementById('nyang-hint').textContent='냐냐냥!!!! 이라고 정확히 입력해야 해냥 😾';
    document.getElementById('nyang-input').value='';
  }
}
function shortcutNyang(){document.getElementById('nyang-input').value='냐냐냥!!!!';setTimeout(()=>checkNyang(),150);}
async function doNyang(){
  document.getElementById('nyang-overlay').style.display='none';
  addUserMsg('냐냐냥!!!!');await sleep(500);
  showTyping();await sleep(900);removeTyping();
  addCatMsg('오케이 집사..\n이 정도면 결과 알려줄 자격 있다냥 😼');
  await sleep(1200);showResult();
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('nyang-overlay').style.display!=='none')checkNyang();});
function calcType(){
  if(scores.T>=3&&scores.K<=1)return 0;
  if(scores.K+scores.A>=4)return 3;
  if(scores.S>=2&&scores.F<=1)return 2;
  return 1;
}
function showResult(){
  document.getElementById('prog').style.width='100%';
  const t=TYPES[calcType()];
  const tipsHtml=t.tips.map(tp=>`<div class="rv-tip-row"><div class="rv-tip-dot"></div><div>${tp}</div></div>`).join('');
  document.getElementById('rv-body').innerHTML=`
    <div class="rv-hero"><div class="rv-avatar"><svg width="80" height="80" viewBox="0 0 60 60"><use href="#${t.sym}"/></svg></div><div class="rv-sub">${t.subType}</div><div class="rv-name">"${t.name}"</div><div class="rv-eng">${t.eng}</div></div>
    <div class="rv-section"><div class="rv-sec-label">냥이의 진단</div><div class="rv-sec-body">${t.diag.split('\n').join('<br>')}</div></div>
    <div class="rv-prophecy"><div class="rv-sec-label">🔮 이대로면? 10년 뒤 예언</div><div class="rv-sec-body">${t.prophecy}</div></div>
    <div class="rv-tips"><div class="rv-sec-label">비밀 치트키 (히든 루트)</div>${tipsHtml}</div>
    <div class="rv-partner"><div class="rv-sec-label">💖 환상의 짝꿍</div><div class="rv-partner-inner"><div class="rv-partner-av"><svg width="36" height="36" viewBox="0 0 60 60"><use href="#${t.partnerSym}"/></svg></div><div><div class="rv-partner-name">${t.partnerName}</div><div class="rv-partner-desc">${t.partnerDesc}</div></div></div></div>
    <div class="rv-cta"><a class="rv-cta-btn" href="${DDOK_URL}" target="_blank">고양이가 말한 히든 루트 진짜로 확인하기 ↗</a><div class="rv-share-row"><button class="rv-share-btn" onclick="if(navigator.share){navigator.share({title:'숨겨진 부자 본능 테스트',text:'나는 ${t.name} 나왔어! 너는?',url:window.location.href})}">친구한테<br>냐냐냥 시키러 가기</button><button class="rv-share-btn" onclick="restart()">테스트<br>다시 하기</button></div></div>`;
  document.getElementById('result-view').classList.add('show');
  document.getElementById('result-view').scrollTop=0;
}
function restart(){
  scores={C:0,S:0,K:0,A:0,F:0,T:0};qIdx=0;
  document.getElementById('chat-area').innerHTML='<div class="date-divider"><span>오늘</span></div>';
  const ic=document.getElementById('inline-choices');if(ic)ic.remove();
  document.getElementById('nyang-input').value='';
  document.getElementById('nyang-hint').textContent='';
  document.getElementById('result-view').classList.remove('show');
  document.getElementById('prog').style.width='0%';
  setTimeout(()=>runQ(0),400);
}
runQ(0);
</script>
</body>
</html>
